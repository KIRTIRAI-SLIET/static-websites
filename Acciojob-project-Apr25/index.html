<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Restaurant App</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <script src="script.js"></script>
    </head>
    <body>
        <div class="container">
            <aside class="sidebar">
                <div class="profile">
                    <img src="/Acciojob-project-Apr25/assets/logo-lg.png" alt="Restaurant Logo"/>
                    <h3>Your Restaurant Menu</h3>
                    <p>Your Slogan</p>
                </div>

                
                <div class="links">
                    <hr>

                    <h4>Quick Links</h4>
                    <ol>
                        <li>Home</li>
                        <li>Your Orders</li>
                        <li>Wallet</li>
                        <li>Profile</li>
                        <li>Logout</li>
                    </ol>

                    <hr>

                    <h4>More About Us</h4>
                    <ol>
                        <li>Our Blog</li>
                        <li>Upcoming Dishes</li>
                        <li>Our Story</li>
                        <li>Social Media Links</li>
                    </ol>
                </div>
            </aside>

            <main class="main">
                <header class="header">
                    <input type="text" placeholder="Search Food Item" />
                    <button class="signup">Signup</button>
                    <button class="login">Login</button>
                    <img src="/Acciojob-project-Apr25/assets/logo.png" alt="Restaurant Mini Logo" class="logo"/>
                </header>

                <section class="banner">
                        <img src="/Acciojob-project-Apr25/assets/banner.png" width="10px" alt="Restaurant Mini Logo"/>
                </section>

                <section class="menu">
                    <h2 id="orderBtn">Menu</h2>

                    <div class="cards" id="menu-container">
                        <!-- Cards will come from JS -->
                    </div>
                </section>
            </main>
        </div>

        <div id="status"></div>
    </body>
</html>
